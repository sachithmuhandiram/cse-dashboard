<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CSE Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg0: #0d1117;
      --bg1: #161b22;
      --bg2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --blue: #58a6ff;
      --yellow: #d29922;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg0); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    .topnav { background: var(--bg1); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    .topnav-brand { font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text); }
    .topnav-brand i { color: var(--green); }

    /* Cards */
    .card { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; }
    .card-header { background: transparent; border-bottom: 1px solid var(--border); padding: 0.6rem 1rem; }
    .card-header .label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }

    /* Table */
    .table { color: var(--text); margin-bottom: 0; }
    .table thead th { border-color: var(--border); color: var(--muted); font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.6rem 1rem; }
    .table tbody td { border-color: var(--border); padding: 0.65rem 1rem; vertical-align: middle; font-size: 0.9rem; }
    .table-hover tbody tr:hover td { background: var(--bg2); }

    /* Badges */
    .ev-volume  { background: rgba(210,153,34,0.2);  color: var(--yellow); padding: 2px 8px; border-radius: 4px; font-size: 0.78rem; font-weight: 600; }
    .ev-up      { background: rgba(63,185,80,0.15);  color: var(--green);  padding: 2px 8px; border-radius: 4px; font-size: 0.78rem; font-weight: 600; }
    .ev-down    { background: rgba(248,81,73,0.15);  color: var(--red);    padding: 2px 8px; border-radius: 4px; font-size: 0.78rem; font-weight: 600; }
    .chg-up     { color: var(--green); }
    .chg-down   { color: var(--red); }
    .pct-up     { background: rgba(63,185,80,0.15);  color: var(--green);  padding: 1px 7px; border-radius: 4px; font-size: 0.8rem; }
    .pct-down   { background: rgba(248,81,73,0.15);  color: var(--red);    padding: 1px 7px; border-radius: 4px; font-size: 0.8rem; }

    /* Stat cards */
    .stat-box { background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem 1.1rem; }
    .stat-box .label { font-size: 0.72rem; color: var(--muted); margin-bottom: 0.25rem; }
    .stat-box .value { font-size: 1rem; font-weight: 600; }

    .text-muted { color: var(--muted) !important; }
    .breadcrumb-item + .breadcrumb-item::before { color: var(--muted); }
    .breadcrumb-item.active { color: var(--muted); }
  </style>
</head>
<body>
<nav class="topnav">
  <a href="/" class="topnav-brand">
    <i class="bi bi-graph-up-arrow"></i> CSE Dashboard
  </a>
  <span class="text-muted small">Colombo Stock Exchange</span>
</nav>

<div class="container-fluid px-4 py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
